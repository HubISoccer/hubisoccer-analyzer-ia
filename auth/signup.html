<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - HubISoccer AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../hubisai.css">
    <style> ... </style>
</head>
<body>
    <nav> ... </nav>
    <div class="auth-container">
        <h2>Inscription</h2>
        <div id="message" class="message"></div>
        <form id="signupForm">
            <input type="text" id="nom" placeholder="Nom (optionnel)">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe (min. 6 caractères)" required>
            <button type="submit" class="auth-btn">S'inscrire</button>
        </form>
        <div class="auth-links"> ... </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://hlszrqnrzfvzjwindwpw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsc3pycW5yemZ2emp3aW5kd3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQ2NzYsImV4cCI6MjA4ODQ5MDY3Nn0.LXdNt0NWF_MlQy7MTclrdGl-RP7pfxl-xjtysIQEBXU';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                // 1. Inscription avec Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { nom }
                    }
                });

                if (authError) throw authError;

                // 2. Créer l'entrée dans la table profiles avec 15 crédits (le trigger s'en chargera si configuré)
                // Si le trigger est en place, cette étape n'est pas nécessaire. Mais on peut la garder au cas où.
                if (authData.user) {
                    const { error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert([
                            { 
                                id: authData.user.id, 
                                email: email, 
                                nom: nom || '',
                                credits: 15 
                            }
                        ]);

                    if (profileError && profileError.code !== '23505') { // Ignorer si déjà existant
                        console.warn('Erreur insertion profile (peut-être trigger déjà fait):', profileError);
                    }
                }

                messageDiv.className = 'message success';
                messageDiv.textContent = 'Inscription réussie ! Vérifie ton email pour confirmer ton compte (si requis). Redirection...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = error.message;
            }
        });
    </script>
</body>
</html>
