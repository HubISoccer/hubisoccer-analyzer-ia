<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - HubISoccer AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../hubisai.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .profile-info h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .profile-info p {
            color: var(--gray);
        }
        .credits-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .credits-card .label {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .credits-card .value {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .btn-recharge {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }
        .btn-recharge:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }
        .section-title {
            color: var(--primary);
            margin: 30px 0 20px;
            border-left: 5px solid var(--gold);
            padding-left: 15px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th {
            text-align: left;
            padding: 10px;
            background: var(--light-gray);
            color: var(--primary);
        }
        .history-table td {
            padding: 10px;
            border-bottom: 1px solid var(--light-gray);
        }
        .history-table tr:hover {
            background: #f8fafc;
        }
        .status-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-gagne { background: #d4edda; color: #155724; }
        .status-perdu { background: #f8d7da; color: #721c24; }
        .status-attente { background: #fff3cd; color: #856404; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        /* Modal de recharge */
        #rechargeModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            max-width: 400px;
            width: 90%;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        .modal-content h3 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-family: var(--font-main);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            background: var(--light-gray);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            font-weight: 600;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            font-weight: 600;
        }
        .btn-save:hover {
            background: var(--primary-light);
        }
        #fedapay-checkout-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="logo-link">
            <img src="../img/logo-navbar.png" alt="HubISoccer" class="logo-nav">
        </a>
        <div class="nav-right">
            <a href="../hubisai.html" class="btn-auth">← Retour à l'analyseur</a>
        </div>
    </nav>

    <div class="profile-container" id="profileContainer">
        <div class="loading">Chargement du profil...</div>
    </div>

    <!-- Modal de recharge (caché par défaut) -->
    <div id="rechargeModal">
        <div class="modal-content">
            <h3>Recharger mon compte</h3>
            <form id="rechargeForm">
                <div class="form-group">
                    <label>Montant (FCFA)</label>
                    <select id="amountFcfa" required>
                        <option value="1000">1000 FCFA (25 HubiSai)</option>
                        <option value="2500">2500 FCFA (62,5 HubiSai)</option>
                        <option value="5000">5000 FCFA (125 HubiSai)</option>
                        <option value="10000">10000 FCFA (250 HubiSai)</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelRecharge" class="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-save">Payer</button>
                </div>
            </form>
            <div id="fedapay-checkout-container"></div>
        </div>
    </div>

    <!-- Chargement des bibliothèques -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.fedapay.com/checkout.js?v=1.1.7"></script>
    <script>
        // ========== CONFIGURATION SUPABASE ==========
        const supabaseUrl = 'https://hlszrqnrzfvzjwindwpw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsc3pycW5yemZ2emp3aW5kd3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQ2NzYsImV4cCI6MjA4ODQ5MDY3Nn0.LXdNt0NWF_MlQy7MTclrdGl-RP7pfxl-xjtysIQEBXU';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ========== CONFIGURATION FEDAPAY (SANDBOX) ==========
        // Remplace par ta clé publique sandbox
        const FEDAPAY_PUBLIC_KEY = 'pk_sandbox_VOTRE_CLE_ICI'; // <-- À MODIFIER

        // ========== VARIABLES GLOBALES ==========
        let currentUser = null;

        // ========== FONCTIONS ==========
        async function loadProfile() {
            const container = document.getElementById('profileContainer');

            const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
            if (userError || !user) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger);"></i>
                        <p>Vous devez être connecté pour voir cette page.</p>
                        <a href="login.html" class="btn-auth" style="margin-top: 20px;">Se connecter</a>
                    </div>
                `;
                return;
            }
            currentUser = user;

            // Charger le profil
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (profileError) {
                console.error('Erreur profil:', profileError);
                container.innerHTML = '<div class="empty-state">Erreur chargement du profil.</div>';
                return;
            }

            // Charger les analyses
            const { data: analyses, error: analysesError } = await supabaseClient
                .from('analyses')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false })
                .limit(20);

            if (analysesError) console.error('Erreur analyses:', analysesError);

            // Charger les transactions
            const { data: transactions, error: transError } = await supabaseClient
                .from('transactions')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false })
                .limit(10);

            if (transError) console.error('Erreur transactions:', transError);

            const initiale = (profile.nom || user.email)[0].toUpperCase();

            // Générer le HTML des analyses
            let analysesHtml = '';
            if (analyses && analyses.length > 0) {
                analysesHtml = analyses.map(a => {
                    const date = new Date(a.created_at).toLocaleString();
                    const resultObj = a.result || {};
                    const resultText = resultObj.dc ? `${resultObj.dc} / ${resultObj.buts || ''}` : 'Analyse simple';
                    return `<tr>
                        <td>${date}</td>
                        <td>${a.type}</td>
                        <td>${resultText}</td>
                        <td>${a.credits_cost}</td>
                    </tr>`;
                }).join('');
            } else {
                analysesHtml = `<tr><td colspan="4" class="empty-state">Aucune analyse effectuée.</td></tr>`;
            }

            // Générer le HTML des transactions
            let transactionsHtml = '';
            if (transactions && transactions.length > 0) {
                transactionsHtml = transactions.map(t => {
                    const date = new Date(t.created_at).toLocaleString();
                    const statusClass = t.status === 'success' ? 'status-gagne' : (t.status === 'pending' ? 'status-attente' : 'status-perdu');
                    return `<tr>
                        <td>${date}</td>
                        <td>${t.amount_fcfa} FCFA</td>
                        <td>${t.credits_earned}</td>
                        <td><span class="status-badge ${statusClass}">${t.status}</span></td>
                    </tr>`;
                }).join('');
            } else {
                transactionsHtml = `<tr><td colspan="4" class="empty-state">Aucune transaction.</td></tr>`;
            }

            // Afficher le contenu
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${initiale}</div>
                    <div class="profile-info">
                        <h2>${profile.nom || 'Utilisateur'}</h2>
                        <p>${user.email}</p>
                    </div>
                </div>

                <div class="credits-card">
                    <span class="label"><i class="fas fa-coins"></i> Solde HubiSai</span>
                    <span class="value" id="creditValue">${profile.credits.toFixed(1)}</span>
                    <button class="btn-recharge" id="showRechargeModalBtn">Recharger</button>
                </div>

                <h3 class="section-title">Historique des analyses</h3>
                <table class="history-table">
                    <thead>
                        <tr><th>Date</th><th>Type</th><th>Résultat</th><th>Coût</th></tr>
                    </thead>
                    <tbody>
                        ${analysesHtml}
                    </tbody>
                </table>

                <h3 class="section-title">Transactions</h3>
                <table class="history-table">
                    <thead>
                        <tr><th>Date</th><th>Montant</th><th>Crédits</th><th>Statut</th></tr>
                    </thead>
                    <tbody>
                        ${transactionsHtml}
                    </tbody>
                </table>
            `;

            // Attacher l'événement au bouton "Recharger"
            document.getElementById('showRechargeModalBtn')?.addEventListener('click', () => {
                document.getElementById('rechargeModal').style.display = 'flex';
            });
        }

        // ========== GESTION DE LA RECHARGE ==========
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('rechargeModal');
            const cancelBtn = document.getElementById('cancelRecharge');
            const rechargeForm = document.getElementById('rechargeForm');

            // Fermer le modal
            cancelBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });

            // Soumission du formulaire de recharge
            rechargeForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!currentUser) {
                    alert('Vous devez être connecté.');
                    return;
                }

                const amountFcfa = parseInt(document.getElementById('amountFcfa').value);
                const creditsEarned = amountFcfa / 40; // 100 FCFA = 2,5 HubiSai

                // 1. Créer une transaction en statut 'pending'
                const { data: transaction, error } = await supabaseClient
                    .from('transactions')
                    .insert([{
                        user_id: currentUser.id,
                        amount_fcfa: amountFcfa,
                        credits_earned: creditsEarned,
                        status: 'pending'
                    }])
                    .select()
                    .single();

                if (error) {
                    console.error('Erreur création transaction:', error);
                    alert('Erreur lors de l\'initialisation du paiement.');
                    return;
                }

                // 2. Ouvrir le checkout FedaPay
                FedaPay.initCheckout({
                    public_key: FEDAPAY_PUBLIC_KEY,
                    transaction: {
                        id: transaction.id, // On utilise l'ID Supabase comme référence
                        amount: amountFcfa,
                        description: `Rechargement de ${creditsEarned} HubiSai`,
                        callback_url: window.location.origin + '/auth/profile.html', // Retour après paiement
                        customer: {
                            email: currentUser.email,
                            firstname: currentUser.user_metadata?.nom || 'Utilisateur'
                        }
                    },
                    onSuccess: async (response) => {
                        // Paiement réussi (simulé en sandbox)
                        await supabaseClient
                            .from('transactions')
                            .update({ 
                                status: 'success',
                                fedapay_transaction_id: response.transaction.id 
                            })
                            .eq('id', transaction.id);

                        // Appeler la fonction pour ajouter les crédits
                        await supabaseClient.rpc('add_credits', { 
                            user_id: currentUser.id, 
                            amount: creditsEarned 
                        });

                        alert('Paiement réussi ! Vos crédits ont été ajoutés.');
                        modal.style.display = 'none';
                        // Recharger le profil
                        loadProfile();
                    },
                    onCancel: async () => {
                        await supabaseClient
                            .from('transactions')
                            .update({ status: 'canceled' })
                            .eq('id', transaction.id);
                        alert('Paiement annulé.');
                        modal.style.display = 'none';
                    },
                    onError: async (error) => {
                        console.error('Erreur FedaPay:', error);
                        await supabaseClient
                            .from('transactions')
                            .update({ status: 'failed' })
                            .eq('id', transaction.id);
                        alert('Erreur lors du paiement.');
                        modal.style.display = 'none';
                    }
                });
            });

            // Charger le profil au démarrage
            loadProfile();

            // Écouter les changements d'auth (si déconnexion ailleurs)
            supabaseClient.auth.onAuthStateChange((event) => {
                if (event === 'SIGNED_OUT') {
                    window.location.reload();
                }
            });
        });
    </script>
</body>
</html>
